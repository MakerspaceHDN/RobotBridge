name: Verify Content and Visuals

on:
  push:
    branches: ["main", "robotbridge-content-update*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
    - name: Install dependencies
      run: npm install
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visual-verification-reports
        path: |
          screenshots/
          playwright-report/
        retention-days: 30
